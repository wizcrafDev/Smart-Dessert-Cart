<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="desserts.css" />
    <link
      rel="stylesheet"
      href="https://fonts.google.com/specimen/Red+Hat+Text"
    />
    <title>Frontend Mentor | Product list with cart</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  </head>

  <body>
    <h1>Desserts</h1>
    <div class="container">
      <div class="dessert-container"></div>
      <div class="cart">
        <p class="items-count">Your Cart (0)</p>
        <div class="cart-container">
          <img
            class="empty-img"
            src="./assets/images/illustration-empty-cart.svg"
            alt=""
          />
          <p class="empty-info">your added item will appear here</p>
        </div>

        <div class="total hidden"></div>
        <div class="cart-carbon hidden">
          <div>
            <img src="assets/images/icon-carbon-neutral.svg" alt="" />
          </div>
          <div>
            <p>This is a <strong>carbon-neutral</strong> delivery</p>
          </div>
        </div>
        <button class="confirm hidden">Confirm Order</button>
      </div>
    </div>
    <div class="modal hidden">
      <!-- <button class="close-modal">&times;</button> -->
      <div class="check-out">
        <div class="checkout-message">
          <img src="assets/images/icon-order-confirmed.svg" alt="" />
          <h2 class="ODM">Order Confirmed</h2>
          <h5>We hope you enjoy your food!</h5>
        </div>

        <div class="confirmed-order"></div>
        <div class="checkout-total"></div>
        <button class="restart">start new order</button>
      </div>
    </div>
    <div class="overlay hidden"></div>

    <script src="desserts.js"></script>
  </body>
</html>
